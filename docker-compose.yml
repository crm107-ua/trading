services:
  freqtrade:
    image: freqtradeorg/freqtrade@sha256:87aa5c6d65359b34e9d99a0bb260a38c0efe0315253811e6f48c2afe8f278a6a
    container_name: freqtrade-quant-lab
    restart: unless-stopped
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./tests:/freqtrade/tests
      - ./pipeline:/freqtrade/pipeline
    env_file:
      - .env
    ports:
      - "8080:8080"
    command: >
      trade
      --config /freqtrade/user_data/config/base.json
      --config /freqtrade/user_data/config/dryrun.json
      --strategy ${STRATEGY:-SmokeTestStrategy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/ping"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

  freqtrade-ui:
    image: freqtradeorg/frequi:latest
    container_name: freqtrade-ui
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - freqtrade
